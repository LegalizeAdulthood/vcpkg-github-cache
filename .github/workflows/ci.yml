name: CI

on:
  push:
    branches:
      - master

permissions:
  contents: read

jobs:
  build:
    name: Build and test
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Verify committed actions load
        run: npm run check-dist

      - name: Build and test
        run: npm run check

      - name: Verify authored files are clean
        run: |
          git diff --check -- . ':(exclude)setup/dist/**' ':(exclude)analyze/dist/**'
          git diff --exit-code -- . ':(exclude)setup/dist/**' ':(exclude)analyze/dist/**'
